apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: karpenter-nodepool
spec:
  template:
    spec:
      requirements:
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
      - key: kubernetes.io/os
        operator: In
        values: ["linux"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["spot", "on-demand"]
      - key: karpenter.k8s.aws/instance-category
        operator: In
        values: ["c", "m", "r", "t"]
      - key: karpenter.k8s.aws/instance-generation
        operator: Gt
        values: ["2"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      taints:           ## enable this taint if u needa taint the nodes. Best practices is to taint the nodes in order to isolate workloads to specific nodes.
      - key: "DevOnly"
        value: "true"
        effect: "NoSchedule"
      expireAfter: 720h # 30 * 24h = 720h
  limits:
    cpu: 50 #limited for test purposes. Prod will use way more CPUs
    memory: 1024Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2 # Amazon Linux 2
  role: "KarpenterNodeRole" 
  subnetSelectorTerms:
  - tags:
      karpenter.sh/discovery: "els-learn-k8s-2" 
  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/discovery: "els-learn-k8s-2" 
  amiSelectorTerms:     #<-- Best practices is to use recommended/latest AMI
  - id: "ami-00d5e071613a99fa1"
  - id: "ami-00b9ad54ecc71c09d"
#   - id: "${GPU_AMI_ID}" # <- GPU Optimized AMD AMI 
#   - name: "amazon-eks-node-${K8S_VERSION}-*" # <- automatically upgrade when a new AL2 EKS Optimized AMI is released. This is unsafe for production workloads. Validate AMIs in lower environments before deploying them to production.

# Search latest AMIs with below commands:
# For ARM Instances:
# aws ec2 describe-images --region us-west-1 --owners amazon --filters "Name=name,Values=amzn2-ami-hvm-*-arm64-gp2" --query "Images[*].[ImageId,Name]" --output table

# For AMD Instances:
# aws ec2 describe-images --region us-west-1 --owners amazon --filters "Name=name,Values=amzn2-ami-hvm-*-x86_64-gp2" --query "Images[*].[ImageId,Name]" --output table
