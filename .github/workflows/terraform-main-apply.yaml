name: Terraform Main Apply

on:
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - ".terraform.lock.hcl"
      - ".github/workflows/**"
      - ".github/aws/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-main-apply
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-1' }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'els-k8s-infra/terraform.tfstate' }}
  TF_VAR_region: ${{ vars.AWS_REGION || 'us-west-1' }}
  TF_VAR_cluster_name: ${{ vars.TF_VAR_cluster_name || 'els-sample-cluster-2' }}
  TF_VAR_acme_email: ${{ vars.TF_VAR_acme_email || '' }}

jobs:
  apply_base:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Set base stage variables
        shell: bash
        run: |
          echo "TF_VAR_enable_cluster_addons=false" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_ingress_nginx=false" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_karpenter=false" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_cert_manager=false" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_addon_custom_resources=false" >> "$GITHUB_ENV"

      - name: Write backend override
        shell: bash
        run: |
          cat <<'EOF' > backend_override.tf
          terraform {
            backend "s3" {
              use_lockfile = true
            }
          }
          EOF

      - name: Terraform init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

  apply_addons:
    needs: apply_base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Set addons stage variables
        shell: bash
        run: |
          echo "TF_VAR_enable_cluster_addons=true" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_ingress_nginx=true" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_karpenter=true" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_cert_manager=false" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_addon_custom_resources=false" >> "$GITHUB_ENV"

          if [[ -n "${{ vars.TF_VAR_acme_email || '' }}" ]]; then
            echo "TF_VAR_enable_cert_manager=true" >> "$GITHUB_ENV"
          fi

      - name: Write backend override
        shell: bash
        run: |
          cat <<'EOF' > backend_override.tf
          terraform {
            backend "s3" {
              use_lockfile = true
            }
          }
          EOF

      - name: Terraform init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

  apply_addon_custom_resources:
    needs: apply_addons
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Set addon custom resource stage variables
        shell: bash
        run: |
          echo "TF_VAR_enable_cluster_addons=true" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_ingress_nginx=true" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_karpenter=true" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_cert_manager=false" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_addon_custom_resources=true" >> "$GITHUB_ENV"

          if [[ -n "${{ vars.TF_VAR_acme_email || '' }}" ]]; then
            echo "TF_VAR_enable_cert_manager=true" >> "$GITHUB_ENV"
          fi

      - name: Write backend override
        shell: bash
        run: |
          cat <<'EOF' > backend_override.tf
          terraform {
            backend "s3" {
              use_lockfile = true
            }
          }
          EOF

      - name: Terraform init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
